services:
  mysql:
    image: mysql:8.4
    container_name: afrochow-mysql
    restart: unless-stopped
    mem_limit: ${MYSQL_MEMORY_LIMIT:-2g}
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
      - --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-1G}
      - --max-connections=${MYSQL_MAX_CONNECTIONS:-100}
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - afrochow

  kafka:
    image: apache/kafka:4.1.2
    container_name: afrochow-kafka
    restart: unless-stopped
    mem_limit: ${KAFKA_MEMORY_LIMIT:-1536m}
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 2147483648
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xms768m -Xmx1g}
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - afrochow

  kafka-init:
    image: apache/kafka:4.1.2
    container_name: afrochow-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092
      --create --if-not-exists
      --topic ${KAFKA_TOPIC_DOMAIN_EVENTS:-afrochow.domain-events}
      --partitions 2
      --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092
      --create --if-not-exists
      --topic ${KAFKA_TOPIC_DOMAIN_EVENTS_RETRY:-afrochow.domain-events.retry}
      --partitions 2
      --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092
      --create --if-not-exists
      --topic ${KAFKA_TOPIC_DOMAIN_EVENTS_DLQ:-afrochow.domain-events.dlq}
      --partitions 2
      --replication-factor 1"
    restart: "no"
    networks:
      - afrochow

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: afrochow-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: afrochow-prod
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    networks:
      - afrochow

  redis:
    image: redis:7.4-alpine
    container_name: afrochow-redis
    restart: unless-stopped
    mem_limit: ${REDIS_MEMORY_LIMIT:-768m}
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --maxmemory
      - "${REDIS_MAXMEMORY:-512mb}"
      - --maxmemory-policy
      - allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - afrochow

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afrochow-app
    restart: unless-stopped
    mem_limit: ${APP_MEMORY_LIMIT:-2g}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - path: .env.prod
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      SERVER_PORT: 8081
      APP_UPLOAD_DIR: /opt/afrochow/uploads
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1536m}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - app-uploads:/opt/afrochow/uploads
    networks:
      - afrochow

  db-backup:
    build:
      context: ./deploy/backup
    container_name: afrochow-db-backup
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - path: .env.prod
        required: false
    environment:
      DB_HOST: ${BACKUP_DB_HOST:-mysql}
      DB_PORT: ${BACKUP_DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BACKUP_BUCKET:-}
      BACKUP_CRON: ${DB_BACKUP_CRON:-0 2 * * *}
      BACKUP_TIMEZONE: ${DB_BACKUP_TIMEZONE:-UTC}
      BACKUP_S3_PREFIX: ${DB_BACKUP_S3_PREFIX:-mysql}
      BACKUP_RETENTION_DAYS: ${DB_BACKUP_LOCAL_RETENTION_DAYS:-7}
      BACKUP_ONESHOT: ${DB_BACKUP_ONESHOT:-false}
      RUN_BACKUP_ON_STARTUP: ${DB_BACKUP_RUN_ON_STARTUP:-false}
    volumes:
      - db-backups:/backups
    networks:
      - afrochow

  nginx:
    image: nginx:1.27-alpine
    container_name: afrochow-nginx
    restart: unless-stopped
    mem_limit: ${NGINX_MEMORY_LIMIT:-256m}
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/afrochow.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - nginx-certs:/etc/letsencrypt
      - nginx-webroot:/var/www/certbot
    networks:
      - afrochow

networks:
  afrochow:
    driver: bridge

volumes:
  mysql-data:
  kafka-data:
  redis-data:
  app-uploads:
  db-backups:
  nginx-certs:
  nginx-webroot:
