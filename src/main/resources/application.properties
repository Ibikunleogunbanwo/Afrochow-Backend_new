spring.application.name=afrochow
##############################
# MySQL DATABASE CONFIG
##############################
# SECURITY: All sensitive values loaded from environment variables
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:afrochow}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver




##############################
# JPA + HIBERNATE CONFIG
##############################
# Default safe value — overridden by application-dev.properties (create) and application-prod.properties (update)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

##############################
# HIKARI CONNECTION POOL (RECOMMENDED)
##############################
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=AfrochowPool

logging.level.com.afrochow.security.JwtAuthenticationFilter=WARN
# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}
app.jwt.encryption.enabled=true
app.jwt.encryption.key=${APP_JWT_ENCRYPTION_KEY}
app.security.token-secret=${APP_TOKEN_SECRET}

spring.jpa.open-in-view=false

# SECURITY: Account Lockout Configuration (OWASP ASVS V2.2.1)
security.login.max-attempts=${SECURITY_MAX_LOGIN_ATTEMPTS:5}
security.login.lockout-duration-minutes=${SECURITY_LOCKOUT_DURATION:15}
security.login.cleanup-days=${SECURITY_CLEANUP_DAYS:30}

# SECURITY: Security Event Logging Configuration
security.events.retention-days=${SECURITY_EVENTS_RETENTION_DAYS:90}

# SECURITY: Password Reset Configuration
security.password-reset.expiration-minutes=${SECURITY_PASSWORD_RESET_EXPIRATION:60}

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# ===== Logging Configuration (overridden per profile) =====
logging.level.root=INFO
logging.level.com.afrochow=INFO
logging.level.org.springframework.security=WARN

# ===== File Upload Configuration =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# Image Upload Settings
app.upload.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:5242880}

# ===================================
# CLOUDINARY CONFIGURATION
# ===================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}


spring.cache.type=caffeine
logging.level.org.springframework.cache=WARN

# ===================================
# REDIS CONFIGURATION
# ===================================
# Local dev can use Docker Redis via 127.0.0.1:6379. Dockerized app uses
# REDIS_HOST=redis from docker-compose.
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

# Swagger disabled by default — enabled in application-dev.properties
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# ===================================
# EMAIL CONFIGURATION (Resend HTTP API)
# ===================================
# Uses Resend HTTP API (port 443) instead of raw SMTP (port 587)

# Enable/disable email sending
spring.mail.enabled=${SPRING_MAIL_ENABLED:true}

# Resend API key — set RESEND_API_KEY in server environment / .env
resend.api-key=${RESEND_API_KEY}

# From address — must be verified in Resend dashboard
resend.from=${RESEND_FROM:onboarding@resend.dev}
spring.mail.from-name=${APP_NAME:Afrochow}

# Email Verification Settings
app.email.verification.expiration-minutes=1440

# ===================================
# THYMELEAF CONFIGURATION
# ===================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.mail.default-encoding=UTF-8

app.name=${APP_NAME:Afrochow}
app.url=${APP_URL:https://afrochow.ca}

# ===================================
# STRIPE CONFIGURATION
# ===================================
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.platform.fee-percent=${STRIPE_PLATFORM_FEE_PERCENT:10}
# Set to true in production once vendors complete Stripe Connect onboarding.
# While false, payments go directly to the platform account (no vendor split).
stripe.connect.required=${STRIPE_CONNECT_REQUIRED:false}
# Webhook endpoint secret from Stripe Dashboard → Webhooks → your endpoint → Signing secret
# Leave empty in dev — signature verification is skipped and a warning is logged instead
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# ===================================
# GOOGLE OAUTH2
# ===================================
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.redirect-uri=${GOOGLE_REDIRECT_URI:postmessage}


# CORS — overridden per profile
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}

# Cookie domain — blank in dev so browser scopes to localhost automatically
app.cookie.domain=${COOKIE_DOMAIN:}

# BCrypt strength — overridden per profile (dev=10, prod=12)
security.bcrypt.strength=10

app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# Rate limiting — overridden per profile (prod has stricter limits)
rate-limit.registration.max=50
rate-limit.registration.window-seconds=60

rate-limit.login.max=50
rate-limit.login.window-seconds=60

rate-limit.password-reset.max=50
rate-limit.password-reset.window-seconds=60

# ── Order SLA ────────────────────────────────────────────────────────────────
# How long (minutes) a vendor has to accept a PENDING order before it is
# automatically cancelled and refunded. Override in prod/dev properties.
order.sla.accept-window-minutes=120
# How often (ms) the SLA job runs to sweep for expired orders (default 1 min)
order.sla.check-interval-ms=60000
# How many hours after order placement a customer may still cancel (0 = no cancellation allowed post-placement)
order.cancellation.window-hours=6


# ── Fulfillment Safety Net Scheduler ─────────────────────────────────────────
# How often (ms) the safety net scheduler runs to auto-deliver overdue orders
# and retry failed payment captures. Default: 30 minutes.
fulfillment.safety-net.interval-ms=1800000
# Grace period (hours) before an overdue order is auto-delivered by the safety net
fulfillment.safety-net.grace-period-hours=2

# ===================================
# KAFKA OUTBOX PUBLISHING
# ===================================
# Defaults are local-dev friendly. For Upstash Kafka, set these env vars:
# KAFKA_BOOTSTRAP_SERVERS, KAFKA_USERNAME, KAFKA_PASSWORD.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:afrochow-notification-service}
spring.kafka.consumer.auto-offset-reset=${KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.ack-mode=manual_immediate

# SASL_SSL is common for hosted Kafka; Aiven client-certificate auth uses SSL.
# Leave protocol PLAINTEXT for local Kafka.
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:}
spring.kafka.properties.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:}
spring.kafka.properties.ssl.truststore.location=${KAFKA_SSL_TRUSTSTORE_LOCATION:}
spring.kafka.properties.ssl.truststore.password=${KAFKA_SSL_TRUSTSTORE_PASSWORD:}
spring.kafka.properties.ssl.truststore.type=${KAFKA_SSL_TRUSTSTORE_TYPE:PKCS12}
spring.kafka.properties.ssl.keystore.location=${KAFKA_SSL_KEYSTORE_LOCATION:}
spring.kafka.properties.ssl.keystore.password=${KAFKA_SSL_KEYSTORE_PASSWORD:}
spring.kafka.properties.ssl.keystore.type=${KAFKA_SSL_KEYSTORE_TYPE:PKCS12}
spring.kafka.properties.ssl.key.password=${KAFKA_SSL_KEY_PASSWORD:}

app.kafka.outbox.publish-timeout-seconds=${KAFKA_OUTBOX_PUBLISH_TIMEOUT_SECONDS:10}
app.kafka.topics.domain-events=${KAFKA_TOPIC_DOMAIN_EVENTS:afrochow.domain-events}
app.kafka.topics.domain-events-retry=${KAFKA_TOPIC_DOMAIN_EVENTS_RETRY:afrochow.domain-events.retry}
app.kafka.topics.domain-events-dlq=${KAFKA_TOPIC_DOMAIN_EVENTS_DLQ:afrochow.domain-events.dlq}
app.kafka.consumers.retry-backoff-ms=${KAFKA_CONSUMER_RETRY_BACKOFF_MS:1000}
app.kafka.consumers.max-retry-attempts=${KAFKA_CONSUMER_MAX_RETRY_ATTEMPTS:3}
app.kafka.consumers.notifications.enabled=${KAFKA_NOTIFICATIONS_CONSUMER_ENABLED:true}
app.kafka.consumers.payment-transfer.enabled=${KAFKA_PAYMENT_TRANSFER_CONSUMER_ENABLED:true}
app.kafka.consumers.payment-transfer.group-id=${KAFKA_PAYMENT_TRANSFER_CONSUMER_GROUP_ID:afrochow-payment-transfer-service}
app.kafka.consumers.address-geocoding.enabled=${KAFKA_ADDRESS_GEOCODING_CONSUMER_ENABLED:true}
app.kafka.consumers.address-geocoding.group-id=${KAFKA_ADDRESS_GEOCODING_CONSUMER_GROUP_ID:afrochow-address-geocoding-service}
